        - generic [ref=e150]:
          - paragraph [ref=e151]: Setting electrical outlets and wall switches for standard, uniform heights is important both for ease of installation and for user convenience.
          - paragraph [ref=e152]: Height variances make it more difficult to fish cable through the walls. Uniformity is critical when placing the insulation in the walls and attaching drywall to the studs. More important is how the switches and outlets work for users. Irregular heights for light switches, for instance, can be disorienting and unsafe.
          - paragraph [ref=e153]: Use this guide to learn the standard light switch and outlet heights for floors, counters, and more, plus the best ways to measure them, and what codes you may need to follow.
          - figure [ref=e154]:
