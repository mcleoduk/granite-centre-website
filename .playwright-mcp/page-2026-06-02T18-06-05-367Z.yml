          - heading "Outlet Height From Floor" [level=2] [ref=e178]
          - paragraph [ref=e179]: The standard height for wall outlet boxes is about 12 inches from the top of the floor covering to the bottom of the receptacle box (or 16 inches to the top of the box).
          - paragraph [ref=e180]:
            - text: If you are setting box heights before the installation of the
            - link "subfloor" [ref=e181] [cursor=pointer]:
              - /url: https://www.thespruce.com/floor-layers-explained-4120153
            - text: ", floor covering, or any"
            - link "underlayment" [ref=e182] [cursor=pointer]:
              - /url: https://www.thespruce.com/flooring-underlayment-1821628
            - text: ", be sure to account for this expected height difference. If you have actual samples of the materials, it's helpful to stack them together and work off of that."
          - paragraph [ref=e183]: For people with disabilities or older adults, 15 inches above the top of the floor covering is usually considered the lowest standard height, but the outlet can be as high as required. People who use wheelchairs may benefit from slightly higher outlet boxes, with the bottom of the box no less than 15 inches above the floor.
          - heading "Countertop Outlet Height" [level=2] [ref=e184]
          - paragraph [ref=e185]: On countertop outlets, it is standard to install outlet boxes so the tops are between 15 and 20 inches from the countertop surface. Make sure all outlet boxes are set at the same height since these outlets will be highly visible.
          - heading "Light Switch Height" [level=2] [ref=e186]
          - paragraph [ref=e187]:
            - text: The standard height for wall switches in most rooms (excluding those over
            - link "kitchen counters" [ref=e188] [cursor=pointer]:
              - /url: https://www.thespruce.com/kitchen-countertop-materials-1822100
            - text: ) is 48 inches above the top of the floor covering (measured to the bottom of the box).
          - paragraph [ref=e189]:
            - text: According to the Fair Housing Act accessibility guidelines, often-used controls like light switches, outlets, and thermostats need to be in accessible locations.
            - generic [ref=e190] [cursor=pointer]: "[ 1 ]"
            - text: For people with disabilities, 48 inches is usually specified as the maximum height, since higher levels can be difficult to reach for people who use a wheelchair. In these situations, it is fine to position them slightly lower, with the bottom of the box 44 inches above the floor, for example.
          - heading "5 Ways to Measure Outlet and Switch Height" [level=2] [ref=e191]
          - paragraph [ref=e192]: Individually measuring each outlet height with a tape measure is one way to set outlet heights. But there are a few other tricks you might wish to use to speed up the process.
          - heading "Measure With a Tape Measure" [level=3] [ref=e193]
          - paragraph [ref=e194]: With a tape measure close at hand, you can quickly measure outlet and switch heights by starting the hook end on the floor and measuring upward.
          - 'figure "Credit: The Spruce / Kevin Norris" [ref=e195]':
            - img "Measuring tape on wooden beam for standard height of wall outlet or switch box" [ref=e198]
            - generic [ref=e200]:
              - text: "Credit:"
              - paragraph [ref=e201]: The Spruce / Kevin Norris
          - heading "Measure With a Laser Level" [level=3] [ref=e202]
          - paragraph [ref=e203]: Determine your preferred box height and make a single mark on any stud. With a laser level placed on the other side of the room, shoot a line across the entire length of the wall you are working on. Use the mark on the wall as your starting point. Work off this line as you place each box, or, to preserve batteries, make pencil marks on studs and then shut off the laser level.
          - paragraph [ref=e204]: If you turn off the level function on the laser level if you just want to draw a straight line, irrespective of floor level. Or you can keep the level function on in order to set box height in relation to the floor.
          - 'figure "Credit: The Spruce / Kevin Norris" [ref=e205]':
            - img "Laser level determining height for wall outlet or switch box across wooden beams" [ref=e208]
            - generic [ref=e210]:
              - text: "Credit:"
              - paragraph [ref=e211]: The Spruce / Kevin Norris
          - heading "Measure With a Drywall Square" [level=3] [ref=e212]
          - paragraph [ref=e213]: This quick method works best before the floor covering is installed. If you have a drywall square, place the long end of the square's "T" perpendicular to the floor. Hold the longest part of the square roughly parallel to the floor. Mark a line across four studs by running your pencil along the bottom part of the straightedge. Place the receptacles at this height. This gives you a height of 14 inches. If you then lay a floor, thus raising the floor level, you end up with a height of roughly 12 inches above the floor.
          - 'figure "Credit: The Spruce / Kevin Norris" [ref=e214]':
            - img "Drywall square measuring height for blue wall outlet or switch box and marking wooden beam" [ref=e217]
            - generic [ref=e219]:
              - text: "Credit:"
              - paragraph [ref=e220]: The Spruce / Kevin Norris
          - heading "Measure With a Hammer" [level=3] [ref=e221]
          - paragraph [ref=e222]:
            - text: Most 16-ounce
            - link "hammers" [ref=e223] [cursor=pointer]:
              - /url: https://www.thespruce.com/tips-for-properly-using-a-hammer-1825125
            - text: are about 13 inches long. Set the hammer on the floor with the head down, then set the box on top of the hammer handle, resulting in a roughly
            - link "12-inch high outlet" [ref=e224] [cursor=pointer]:
              - /url: https://www.thespruce.com/height-to-install-switches-1152823
            - text: height after the floor covering is installed.
          - 'figure "Credit: The Spruce / Kevin Norris" [ref=e225]':
            - img "Yellow and black hammer standing up against wooden beam to determine wall outlet or switch box height" [ref=e228]
            - generic [ref=e230]:
              - text: "Credit:"
              - paragraph [ref=e231]: The Spruce / Kevin Norris
          - heading "Measure With a Story Pole" [level=3] [ref=e232]
          - paragraph [ref=e233]: A story pole is a homemade tool that's nothing more than a piece of scrap two-by-four or any type of lumber clearly marked with any height you need.
          - paragraph [ref=e234]: You need to measure only once, when you first make the story pole. You can use a single story pole for all of your box heights, and you can even mark different heights (outlets and light switches) on the same story pole. It helps to outline both the top and bottom of the wall box on the story pole, to avoid confusion when marking studs.
          - paragraph [ref=e235]:
            - text: Simply stand up the pole next to a
            - link "wall stud" [ref=e236] [cursor=pointer]:
              - /url: https://www.thespruce.com/how-to-find-studs-without-a-stud-finder-7488471
            - text: and mark the stud at the appropriate height. Make sure to mark the pole clearly. Notes like "bottom of outlet box" and "center of switch box" help prevent mistakes. When you are finished with your project, store the pole for later use or recycle it for use as a building material.
          - 'figure "Credit: The Spruce / Kevin Norris" [ref=e237]':
            - img "Story pole wooden beam with markings for top and bottom of wall outlet or switch box" [ref=e240]
            - generic [ref=e242]:
              - text: "Credit:"
              - paragraph [ref=e243]: The Spruce / Kevin Norris
          - paragraph [ref=e246]:
            - text: A story pole doesn't even need to be a
            - emphasis [ref=e247]: pole
            - text: ": It can be anything tall enough to indicate the height of the outlet or light switch. Use a toolbox, storage box, work light tripod, or anything that you commonly use when working."
          - heading "NEC Code Guidance on Outlet and Switch Heights" [level=2] [ref=e248]
          - paragraph [ref=e249]:
            - text: Although the
            - link "National Electrical Code" [ref=e250] [cursor=pointer]:
              - /url: https://www.thespruce.com/electrical-code-for-outlets-1821513
            - text: (NEC) has many precise regulations for most aspects of residential wiring, it does not specify a height for standard wall outlets (receptacles) or light switches.
          - paragraph [ref=e251]:
            - text: As a result, heights are often a matter of convention or preference. However, your
            - link "local electrical code" [ref=e252] [cursor=pointer]:
              - /url: https://www.thespruce.com/kitchen-electrical-code-basics-1821527
            - text: is the ultimate voice in these matters, since municipalities often adopt and adapt model building codes. Be sure to check with your city's building department for any specific requirements.
          - paragraph [ref=e253]: Without guidance from the NEC, electricians typically follow common professional standards, within an acceptable range, for box installation heights.
          - paragraph [ref=e254]: While it's best to stick to box height standards as much as possible, there’s room for adjustments. For example, if you are finding it too difficult to drive a nail into a wood knot in one of the studs, it is permissible to move the box slightly up or down to avoid the knot.
          - generic [ref=e255]:
            - generic [ref=e256]: FAQ
            - list [ref=e257]:
              - listitem [ref=e258]:
                - generic [ref=e260]: What is the 6/12 rule for electrical outlets?
                - paragraph [ref=e264]: In general, the NEC requires outlets to be installed no more than 12 feet apart in living areas and 6 feet apart in kitchens and bathrooms.
              - listitem [ref=e265]:
                - generic [ref=e267]: Are there spacing standards for floor outlets?
                - paragraph [ref=e271]: Floor outlets can be practical and discreet. The NEC does have standards for floor outlets. For example, they must be located within 18 inches of a wall to count towards the required number of outlets in a room. For more information on floor outlets, check NEC's guidelines.
              - listitem [ref=e272]:
                - generic [ref=e274]: How much does it cost to replace outlets?
                - paragraph [ref=e278]:
                  - text: Costs differ depending on if you are replacing, rewiring, or adding an outlet and what type you are installing. A basic outlet can cost around $40 to replace,
                  - link "GFCI outlets" [ref=e279] [cursor=pointer]:
                    - /url: https://www.thespruce.com/upgrade-2-prong-outlet-new-gfci-1824671
                  - text: can cost double or more to replace, and rewiring or adding a new outlet can cost around $1,000.
                  - generic [ref=e280] [cursor=pointer]: "[ 2 ]"
